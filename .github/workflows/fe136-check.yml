# MEM-80 / FEAT-136: fail CI when accounts older than 24h still have `username IS NULL`.
# Script: `scripts/fe136-usernames.mjs` → `npm run fe136:check`
#
# Required repository secret (read-only Postgres is enough for COUNT queries):
#   DATABASE_URL
# Configure at: GitHub → repo Settings → Secrets and variables → Actions → New repository secret
#
# Ops context: README “Usernames (FEAT-127)” + header comment in `scripts/fe136-usernames.mjs`.

name: FEAT-136 username check

on:
  workflow_dispatch:
  schedule:
    # Daily; minute chosen to reduce overlap with top-of-hour cron traffic
    - cron: "25 16 * * *"
  push:
    branches: [main]

jobs:
  fe136-check:
    runs-on: ubuntu-latest
    env:
      DATABASE_URL: ${{ secrets.DATABASE_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Run fe136 check (stale users without username)
        run: npm run fe136:check
